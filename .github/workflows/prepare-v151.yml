name: Prepare version 1.5.1 branch

on:
  push:
    branches:
      - feature/1.5.1-dropbox-backups

permissions:
  contents: write

jobs:
  prepare:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate deployable project files
        run: node bootstrap.mjs

      - name: Commit prepared branch
        run: |
          rm .github/workflows/prepare-v151.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json netlify.toml tsconfig.json public netlify .github/workflows/prepare-v151.yml
          git commit -m "Prepare deployable version 1.5.1"
          git push
