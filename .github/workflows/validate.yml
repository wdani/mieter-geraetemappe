name: Validate project

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate deployable project tree
        run: node bootstrap.mjs

      - name: Install dependencies
        run: npm install --silent

      - name: Generate application assets
        run: npm run build

      - name: Check browser JavaScript syntax
        run: node --check public/app.js

      - name: Check TypeScript functions
        id: typescript
        continue-on-error: true
        run: |
          set +e
          npm run check -- --pretty false > typescript-check.log 2>&1
          code=$?
          cat typescript-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload TypeScript check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-check-log
          path: typescript-check.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail when TypeScript check failed
        if: steps.typescript.outputs.exit_code != '0'
        run: exit 1
