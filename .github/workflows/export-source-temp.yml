name: Export source temporary

on:
  push:
    branches:
      - feature/multi-links-label-backup

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: repository-source
          path: |
            source
            templates
            scripts
            assets
            docs
            README.md
            ROADMAP.md
            CHANGELOG.md
            bootstrap.mjs
            netlify.toml
            package.json
            tsconfig.json
          retention-days: 1
