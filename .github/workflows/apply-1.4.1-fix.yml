name: Apply 1.4.1 fix

on:
  push:
    branches:
      - fix/1.4.1-dropbox-version
    paths:
      - .github/workflows/apply-1.4.1-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Apply Dropbox and version-display fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('source/public/app.js')
          text = app.read_text(encoding='utf-8')
          old = '''    if (url.hostname.includes("dropbox.com")) {
                url.searchParams.set("dl", "1");
                url.searchParams.delete("raw");
              }'''.replace('              ', '      ')
          new = '''    if (url.hostname.includes("dropbox.com")) {
                url.searchParams.delete("dl");
                url.searchParams.set("raw", "1");
              }'''.replace('              ', '      ')
          if old not in text:
              raise SystemExit('Dropbox link conversion block not found')
          app.write_text(text.replace(old, new, 1), encoding='utf-8')

          index = Path('source/public/index.html')
          text = index.read_text(encoding='utf-8')
          old = '  <script src="/app.js"></script>\n</body>'
          new = '''  <footer class="app-footer" aria-label="Versionsinformation">
            <span>Gerätemappe</span>
            <span class="app-version">Version 1.4.1</span>
          </footer>

          <script src="/app.js"></script>
          </body>'''.replace('          ', '  ')
          if old not in text:
              raise SystemExit('Index script marker not found')
          index.write_text(text.replace(old, new, 1), encoding='utf-8')

          styles = Path('source/public/styles.css')
          css = styles.read_text(encoding='utf-8')
          footer_css = '''

          .app-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 18px 2px calc(24px + env(safe-area-inset-bottom));
            color: var(--muted);
            font-size: .82rem;
          }

          .app-version {
            font-variant-numeric: tabular-nums;
            font-weight: 750;
          }
          '''.replace('          ', '')
          if '.app-version {' not in css:
              styles.write_text(css.rstrip() + footer_css + '\n', encoding='utf-8')

          worker = Path('source/public/service-worker.js')
          text = worker.read_text(encoding='utf-8')
          if 'geraetemappe-shell-v4' not in text:
              raise SystemExit('Expected service worker cache v4 not found')
          worker.write_text(text.replace('geraetemappe-shell-v4', 'geraetemappe-shell-v5', 1), encoding='utf-8')

          package = Path('templates/package.template.json')
          text = package.read_text(encoding='utf-8')
          if '"version": "1.4.0"' not in text:
              raise SystemExit('Expected package version 1.4.0 not found')
          package.write_text(text.replace('"version": "1.4.0"', '"version": "1.4.1"', 1), encoding='utf-8')

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          text = text.replace('## Aktueller Stand: Version 1.4.0', '## Aktueller Stand: Version 1.4.1', 1)
          marker = '- Backup-Download und serverseitig validierter Backup-Import\n'
          additions = '- Dropbox-Dokumente werden möglichst direkt im Browser geöffnet (`raw=1`)\n- sichtbare Versionsanzeige in der Oberfläche\n'
          if additions not in text:
              if marker in text:
                  text = text.replace(marker, marker + additions, 1)
              else:
                  text += '\n' + additions
          readme.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          entry = '''## 1.4.1

          - Dropbox-Freigabelinks verwenden `raw=1`, damit unterstützte Dokumente direkt im Browser geöffnet werden und die Dropbox-Zwischenseite möglichst umgangen wird.
          - Die geladene App-Version wird dauerhaft im Footer angezeigt.
          - PWA-Cache für den Fix erneuert.

          '''.replace('          ', '')
          if '## 1.4.1' not in text:
              text = text.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-1.4.1-fix.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Dropbox browser opening and show version 1.4.1"
          git push
